<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>大调顺阶三和弦</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #090b0f;
      --surface: #12151c;
      --surface-elev: #181c26;
      --border: rgba(255, 255, 255, 0.065);
      --text: #eceef3;
      --muted: #6d7588;
      --accent: #8ab4ff;
      --ring: rgba(138, 180, 255, 0.45);
      --ease: cubic-bezier(0.22, 1, 0.36, 1);
      --spring: cubic-bezier(0.34, 1.45, 0.64, 1);
    }
    * { box-sizing: border-box; }
    html {
      scroll-behavior: smooth;
      height: -webkit-fill-available;
    }
    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      min-height: -webkit-fill-available;
      font-family: Outfit, system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--bg);
      overflow-x: hidden;
      padding-left: env(safe-area-inset-left, 0);
      padding-right: env(safe-area-inset-right, 0);
    }
    .bg-scene {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background:
        radial-gradient(ellipse 80% 55% at 50% -10%, rgba(55, 75, 120, 0.18) 0%, transparent 50%),
        radial-gradient(ellipse 50% 40% at 90% 80%, rgba(90, 50, 90, 0.08) 0%, transparent 45%),
        linear-gradient(180deg, #0b0d12 0%, var(--bg) 45%, #060709 100%);
    }
    .bg-scene::before {
      content: "";
      position: absolute;
      inset: 0;
      opacity: 0.35;
      background-image: radial-gradient(rgba(255, 255, 255, 0.045) 1px, transparent 1px);
      background-size: 4px 4px;
      mask-image: radial-gradient(ellipse 75% 65% at 50% 35%, black 0%, transparent 72%);
    }
    .shell {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      min-height: 100dvh;
      min-height: -webkit-fill-available;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      justify-content: center;
      padding: max(env(safe-area-inset-top, 0px), clamp(1.25rem, 4.5vw, 2.75rem))
        max(env(safe-area-inset-right, 0px), clamp(0.85rem, 3.5vw, 1.75rem))
        max(env(safe-area-inset-bottom, 0px), clamp(1.25rem, 4.5vw, 2.75rem))
        max(env(safe-area-inset-left, 0px), clamp(0.85rem, 3.5vw, 1.75rem));
      max-width: 46rem;
      margin: 0 auto;
      animation: fadeUp 0.55s var(--ease) both;
    }
    .hero {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-end;
      justify-content: space-between;
      gap: 1rem 1.5rem;
      margin-bottom: 1.75rem;
    }
    .hero h1 {
      font-weight: 650;
      font-size: clamp(1.5rem, 5vw, 2rem);
      letter-spacing: -0.03em;
      line-height: 1.15;
      margin: 0;
      flex: 1 1 12rem;
      opacity: 0;
      animation: fadeUp 0.5s var(--ease) 0.06s forwards;
    }
    .hero h1 .key-title {
      display: inline-block;
      color: var(--accent);
      font-weight: 700;
      min-width: 0.5em;
    }
    .hero h1 .key-title.is-bump {
      animation: keyBump 0.45s var(--spring) both;
    }
    @keyframes keyBump {
      0%, 100% { transform: scale(1); }
      40% { transform: scale(1.08); }
    }
    .hero h1 .title-rest {
      font-weight: 500;
      color: var(--muted);
      font-size: 0.92em;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .toolbar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      opacity: 0;
      animation: fadeUp 0.5s var(--ease) 0.12s forwards;
    }
    .toolbar label {
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .select-wrap {
      position: relative;
    }
    .select-wrap::after {
      content: "";
      position: absolute;
      right: 0.7rem;
      top: 50%;
      width: 0.4rem;
      height: 0.4rem;
      border-right: 1.5px solid var(--muted);
      border-bottom: 1.5px solid var(--muted);
      transform: translateY(-60%) rotate(45deg);
      pointer-events: none;
      opacity: 0.55;
    }
    select {
      appearance: none;
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text);
      padding: 0.5rem 2.1rem 0.5rem 0.85rem;
      min-width: 8.5rem;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface-elev);
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    select:hover {
      border-color: rgba(138, 180, 255, 0.25);
    }
    select:focus-visible {
      outline: none;
      box-shadow: 0 0 0 3px var(--ring);
    }
    .chord-strip {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: clamp(0.48rem, 2vw, 0.75rem);
      width: 100%;
      opacity: 0;
      animation: fadeUp 0.55s var(--ease) 0.18s forwards;
    }
    @media (max-width: 640px) {
      .hero {
        flex-direction: column;
        align-items: flex-start;
      }
      .toolbar {
        width: 100%;
        justify-content: flex-start;
      }
    }
    /** 竖屏窄屏：一排 7 格等宽；间距与桌面同一套 clamp，不额外压窄 */
    @media (max-width: 520px) and (orientation: portrait) {
      .shell {
        justify-content: flex-start;
        padding-top: max(env(safe-area-inset-top, 0px), 1rem);
      }
      .hero {
        margin-bottom: 1rem;
        gap: 0.75rem;
      }
      .hero h1 {
        font-size: clamp(1.3rem, 5vw, 1.6rem);
        line-height: 1.2;
      }
      .chord-strip {
        gap: clamp(0.42rem, 1.85vw, 0.68rem);
      }
      .chord-key {
        min-height: clamp(6.25rem, 24vw, 7.75rem);
        padding: 0.72rem 0.32rem 0.65rem;
        padding-left: 0.48rem;
        border-radius: 12px;
      }
      .chord-key::before {
        left: 5px;
        width: 3px;
      }
      .chord-key__label {
        font-size: clamp(0.78rem, 3.2vw, 0.98rem);
      }
      .chord-key__roman {
        font-size: clamp(0.54rem, 2vw, 0.64rem);
        line-height: 1.3;
        margin-top: 0.38rem;
      }
    }
    .chord-key {
      touch-action: manipulation;
      appearance: none;
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: clamp(7.75rem, 22vw, 9.75rem);
      padding: 0.9rem 0.45rem 0.8rem;
      padding-left: 0.58rem;
      border: 1px solid var(--border);
      border-radius: 14px;
      cursor: pointer;
      background: linear-gradient(165deg, var(--surface-elev) 0%, var(--surface) 100%);
      box-shadow: 0 1px 0 rgba(255, 255, 255, 0.04) inset;
      transform: translateY(0);
      transition: transform 0.22s var(--spring), border-color 0.2s, box-shadow 0.25s var(--ease);
      animation: chordIn 0.5s var(--ease) backwards;
      animation-delay: calc(0.22s + var(--i, 0) * 0.045s);
    }
    @keyframes chordIn {
      from {
        opacity: 0;
        transform: translateY(14px);
      }
    }
    .chord-key::before {
      content: "";
      position: absolute;
      left: 6px;
      top: 14%;
      bottom: 14%;
      width: 3px;
      border-radius: 2px;
      background: var(--stripe);
      box-shadow: 0 0 14px rgba(0, 0, 0, 0.35);
      opacity: 0.92;
      transition: opacity 0.2s, box-shadow 0.25s;
    }
    .chord-key:hover {
      transform: translateY(-3px);
      border-color: rgba(255, 255, 255, 0.1);
      box-shadow: 0 14px 28px rgba(0, 0, 0, 0.35);
    }
    .chord-key:hover::before {
      box-shadow: 0 0 18px var(--stripe-glow);
    }
    .chord-key:active,
    .chord-key.is-pressing {
      transform: translateY(0) scale(0.97);
      transition-duration: 0.1s;
    }
    .chord-key:focus-visible {
      outline: none;
      box-shadow: 0 0 0 3px var(--ring);
    }
    .chord-key *,
    .chord-key::before {
      -webkit-user-select: none;
      user-select: none;
    }
    /** 第一行：和弦名；第二行：罗马数字 · 结构（汉字） */
    .chord-key__label {
      font-size: clamp(0.95rem, 2.8vw, 1.15rem);
      font-weight: 650;
      letter-spacing: -0.02em;
      color: var(--text);
      line-height: 1.12;
      text-align: center;
    }
    .chord-key__roman {
      margin-top: 0.45rem;
      font-family: "JetBrains Mono", ui-monospace, monospace;
      font-size: clamp(0.6rem, 1.85vw, 0.72rem);
      font-weight: 500;
      color: var(--muted);
      text-align: center;
      line-height: 1.35;
      max-width: 100%;
    }
    .chord-key__roman span.roman-h {
      color: var(--stripe);
      opacity: 0.95;
    }
    @media (prefers-reduced-motion: reduce) {
      .bg-scene::before,
      .shell,
      .hero h1,
      .toolbar,
      .chord-strip,
      .chord-key,
      .hero h1 .key-title.is-bump {
        animation: none !important;
      }
      .hero h1,
      .toolbar,
      .chord-strip,
      .chord-key {
        opacity: 1;
        transform: none;
      }
      .chord-key:hover {
        transform: none;
      }
    }
  </style>
</head>
<body>
  <div class="bg-scene" aria-hidden="true"></div>
  <main class="shell">
    <header class="hero">
      <h1>
        <span id="keyTitle" class="key-title">C</span><span class="title-rest"> 大调 · 顺阶三和弦</span>
      </h1>
      <div class="toolbar">
        <label for="keySelect">调式</label>
        <div class="select-wrap">
          <select id="keySelect" aria-label="选择大调调式"></select>
        </div>
      </div>
    </header>
    <div class="chord-strip" id="grid" role="group" aria-label="大调顺阶三和弦"></div>
  </main>

  <script>
    function midiToHz(m) {
      return 440 * Math.pow(2, (m - 69) / 12);
    }

    /** Salamander（tambien/Piano）：每小三度一轨，文件名 A / C / Ds / Fs + 八度 + v力度 */
    const PIANO_BASE =
      "https://cdn.jsdelivr.net/gh/tambien/Piano@master/audio/";
    const PIANO_VELOCITY = 5;
    const pianoBufferCache = new Map();
    const pianoLoadPromises = new Map();

    function nearestPianoSampleMidi(midi) {
      const k = Math.round((midi - 21) / 3);
      const clamped = Math.max(0, Math.min(29, k));
      return 21 + 3 * clamped;
    }

    function pianoSampleFilename(baseMidi) {
      const pc = baseMidi % 12;
      const oct = Math.floor(baseMidi / 12) - 1;
      const stem = { 0: "C", 3: "Ds", 6: "Fs", 9: "A" }[pc];
      return `${stem}${oct}v${PIANO_VELOCITY}.mp3`;
    }

    function loadPianoBuffer(ctx, baseMidi) {
      if (pianoBufferCache.has(baseMidi)) {
        return Promise.resolve(pianoBufferCache.get(baseMidi));
      }
      if (pianoLoadPromises.has(baseMidi)) {
        return pianoLoadPromises.get(baseMidi);
      }
      const url = PIANO_BASE + pianoSampleFilename(baseMidi);
      const p = fetch(url)
        .then((res) => {
          if (!res.ok) throw new Error(`${res.status} ${url}`);
          return res.arrayBuffer();
        })
        .then((ab) => ctx.decodeAudioData(ab.slice(0)))
        .then((buf) => {
          pianoBufferCache.set(baseMidi, buf);
          pianoLoadPromises.delete(baseMidi);
          return buf;
        })
        .catch((err) => {
          pianoLoadPromises.delete(baseMidi);
          throw err;
        });
      pianoLoadPromises.set(baseMidi, p);
      return p;
    }

    function chordSampleBases(midiNotes) {
      return [...new Set(midiNotes.map(nearestPianoSampleMidi))];
    }

    const ROMAN = [
      "I — 大三",
      "ii — 小三",
      "iii — 小三",
      "IV — 大三",
      "V — 大三",
      "vi — 小三",
      "vii° — 减三",
    ];

    /** 十二个大调：主音 MIDI（中央 C 附近）与顺阶三和弦标记 */
    const MAJOR_KEYS = [
      { id: "C", tonicMidi: 60, labels: ["C", "Dm", "Em", "F", "G", "Am", "B°"] },
      { id: "Db", tonicMidi: 61, labels: ["Db", "Ebm", "Fm", "Gb", "Ab", "Bbm", "C°"] },
      { id: "D", tonicMidi: 62, labels: ["D", "Em", "F#m", "G", "A", "Bm", "C#°"] },
      { id: "Eb", tonicMidi: 63, labels: ["Eb", "Fm", "Gm", "Ab", "Bb", "Cm", "D°"] },
      { id: "E", tonicMidi: 64, labels: ["E", "F#m", "G#m", "A", "B", "C#m", "D#°"] },
      { id: "F", tonicMidi: 65, labels: ["F", "Gm", "Am", "Bb", "C", "Dm", "E°"] },
      { id: "F#", tonicMidi: 66, labels: ["F#", "G#m", "A#m", "B", "C#", "D#m", "E#°"] },
      { id: "G", tonicMidi: 67, labels: ["G", "Am", "Bm", "C", "D", "Em", "F#°"] },
      { id: "Ab", tonicMidi: 68, labels: ["Ab", "Bbm", "Cm", "Db", "Eb", "Fm", "G°"] },
      { id: "A", tonicMidi: 69, labels: ["A", "Bm", "C#m", "D", "E", "F#m", "G#°"] },
      { id: "Bb", tonicMidi: 70, labels: ["Bb", "Cm", "Dm", "Eb", "F", "Gm", "A°"] },
      { id: "B", tonicMidi: 71, labels: ["B", "C#m", "D#m", "E", "F#", "G#m", "A#°"] },
    ];

    /**
     * C 大调「就近」固定排声（小字组～小字一组一带，和弦之间少跳、好弹）：
     * C4E4G4、A3D4F4、B3E4G4、A3C4F4、B3D4G4、A3C4E4、B3D4F4（I … vii°）。
     * 其它调：整表半音平移至该调主音（+ (主音MIDI − 60)）。
     */
    const VOICING_C_TEMPLATE = [
      [60, 64, 67],
      [57, 62, 65],
      [59, 64, 67],
      [57, 60, 65],
      [59, 62, 67],
      [57, 60, 64],
      [59, 62, 65],
    ];

    function voicedTriadsForKey(tonicMidi) {
      const d = tonicMidi - 60;
      return VOICING_C_TEMPLATE.map((ch) => ch.map((n) => n + d));
    }

    /** 钢琴输出总增益（易偏小，与合成器分开调） */
    const PIANO_LEVEL = 1.48;
    const SYNTH_LEVEL = 1.28;

    function collectSampleBasesForTonic(tonicMidi) {
      return chordSampleBases(voicedTriadsForKey(tonicMidi).flat());
    }

    function preloadPianoForTonic(tonicMidi) {
      const ctx = getCtx();
      const bases = collectSampleBasesForTonic(tonicMidi);
      return Promise.all(bases.map((b) => loadPianoBuffer(ctx, b))).catch(() => {});
    }

    let audioCtx = null;

    function getCtx() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      return audioCtx;
    }

    /** iOS 等：须 await resume 后再调度节点，否则易偶发无声 */
    function whenContextReady(ctx) {
      if (!ctx || ctx.state === "closed" || ctx.state === "running") return Promise.resolve();
      return ctx.resume().catch(() => {});
    }

    function whenReadyAndSamples(ctx, midiNotes) {
      return Promise.all([
        whenContextReady(ctx),
        ...chordSampleBases(midiNotes).map((b) => loadPianoBuffer(ctx, b)),
      ]);
    }

    function playbackRateSemi(midi, baseMidi) {
      return Math.pow(2, (midi - baseMidi) / 12);
    }

    function disconnectGainLater(master, ms) {
      setTimeout(() => {
        try {
          master.disconnect();
        } catch (_) {}
      }, ms);
    }

    function fadeMasterOut(master, ctx, fadeSec) {
      const t = ctx.currentTime;
      try {
        master.gain.cancelScheduledValues(t);
        master.gain.setValueAtTime(Math.max(1e-4, master.gain.value), t);
        master.gain.exponentialRampToValueAtTime(0.001, t + fadeSec);
      } catch (_) {}
    }

    function playChordSynth(midiNotes, opts = {}) {
      const durationSec = opts.durationSec ?? 1.35;
      const destination = opts.destination;
      const gainScale = opts.gainScale ?? 1;
      const ctx = getCtx();
      whenContextReady(ctx).then(() => {
        const master = ctx.createGain();
        master.gain.value = 0;
        master.connect(destination || ctx.destination);

        const now = ctx.currentTime + 0.002;
        const attack = 0.018;
        const peak = 0.22 * gainScale * SYNTH_LEVEL;

        master.gain.setValueAtTime(0, now);
        master.gain.linearRampToValueAtTime(peak, now + attack);
        master.gain.exponentialRampToValueAtTime(0.001, now + durationSec);

        midiNotes.forEach((midi, i) => {
          const detuneCents = (i - 1) * 3;
          const osc = ctx.createOscillator();
          osc.type = "triangle";
          osc.frequency.value = midiToHz(midi);
          osc.detune.value = detuneCents;

          const voiceGain = ctx.createGain();
          voiceGain.gain.value = 0.42 * gainScale * SYNTH_LEVEL;

          osc.connect(voiceGain);
          voiceGain.connect(master);
          osc.start(now);
          osc.stop(now + durationSec + 0.05);
        });

        disconnectGainLater(master, (durationSec + 0.2) * 1000);
      });
    }

    function playChord(midiNotes, opts = {}) {
      const durationSec = opts.durationSec ?? 2.45;
      const destination = opts.destination;
      const gainScale = opts.gainScale ?? 1;
      const ctx = getCtx();
      const synthFallback = () =>
        playChordSynth(midiNotes, { durationSec, destination, gainScale });

      whenReadyAndSamples(ctx, midiNotes)
        .then(() => {
          const master = ctx.createGain();
          master.gain.value = 0;
          master.connect(destination || ctx.destination);

          const now = ctx.currentTime + 0.008;
          const attack = 0.008;
          const peak = 0.62 * gainScale * PIANO_LEVEL;

          master.gain.setValueAtTime(0, now);
          master.gain.linearRampToValueAtTime(peak, now + attack);
          master.gain.exponentialRampToValueAtTime(0.001, now + durationSec);

          let started = 0;
          midiNotes.forEach((midi, i) => {
            const base = nearestPianoSampleMidi(midi);
            const buf = pianoBufferCache.get(base);
            if (!buf) return;

            const src = ctx.createBufferSource();
            src.buffer = buf;
            src.playbackRate.value = playbackRateSemi(midi, base);

            const voiceGain = ctx.createGain();
            voiceGain.gain.value = (0.62 - i * 0.045) * gainScale * PIANO_LEVEL;

            src.connect(voiceGain);
            voiceGain.connect(master);

            const bufSec = buf.duration / src.playbackRate.value;
            const stopAt = now + Math.min(bufSec, durationSec + 0.25);
            src.start(now);
            src.stop(stopAt);
            started += 1;
          });

          if (started === 0) {
            try {
              master.disconnect();
            } catch (_) {}
            synthFallback();
            return;
          }

          disconnectGainLater(master, (durationSec + 0.45) * 1000);
        })
        .catch(synthFallback);
    }

    function playChordSynthHold(midiNotes, opts = {}) {
      const ctx = getCtx();
      const destination = opts.destination || ctx.destination;
      const gainScale = opts.gainScale ?? 1;
      return whenContextReady(ctx).then(() => {
        const master = ctx.createGain();
        master.gain.value = 0;
        master.connect(destination);
        const now = ctx.currentTime + 0.004;
        master.gain.linearRampToValueAtTime(0.17 * gainScale * SYNTH_LEVEL, now + 0.014);
        const oscs = [];
        midiNotes.forEach((midi) => {
          const o = ctx.createOscillator();
          o.type = "triangle";
          o.frequency.value = midiToHz(midi);
          const g = ctx.createGain();
          g.gain.value = 0.38 * gainScale * SYNTH_LEVEL;
          o.connect(g);
          g.connect(master);
          o.start(now);
          oscs.push(o);
        });
        return {
          stop() {
            const t = ctx.currentTime;
            fadeMasterOut(master, ctx, 0.12);
            oscs.forEach((o) => {
              try {
                o.stop(t + 0.14);
              } catch (_) {}
            });
            disconnectGainLater(master, 220);
          },
        };
      });
    }

    /** 长按：每声部单轨 loop，无叠奏；松手调用 stop() */
    function playChordHold(midiNotes, opts = {}) {
      const ctx = getCtx();
      const destination = opts.destination || ctx.destination;
      const gainScale = opts.gainScale ?? 1;
      const synthHoldFallback = () => playChordSynthHold(midiNotes, opts);

      return whenReadyAndSamples(ctx, midiNotes)
        .then(() => {
          const master = ctx.createGain();
          master.gain.value = 0;
          master.connect(destination);
          const now = ctx.currentTime + 0.008;
          const peak = 0.55 * gainScale * PIANO_LEVEL;
          master.gain.linearRampToValueAtTime(peak, now + 0.014);
          const sources = [];
          midiNotes.forEach((midi, i) => {
            const base = nearestPianoSampleMidi(midi);
            const buf = pianoBufferCache.get(base);
            if (!buf) return;
            const src = ctx.createBufferSource();
            src.buffer = buf;
            src.playbackRate.value = playbackRateSemi(midi, base);
            const bufLen = buf.duration;
            if (bufLen > 0.55) {
              src.loop = true;
              src.loopStart = Math.min(bufLen * 0.28, bufLen * 0.38);
              src.loopEnd = Math.max(bufLen * 0.84, src.loopStart + 0.1);
              if (src.loopEnd - src.loopStart < 0.09) {
                src.loop = false;
              }
            }
            const vg = ctx.createGain();
            vg.gain.value = (0.56 - i * 0.04) * gainScale * PIANO_LEVEL;
            src.connect(vg);
            vg.connect(master);
            src.start(now);
            sources.push(src);
          });
          if (sources.length === 0) {
            try {
              master.disconnect();
            } catch (_) {}
            return synthHoldFallback();
          }
          return {
            stop() {
              const t = ctx.currentTime;
              fadeMasterOut(master, ctx, 0.13);
              sources.forEach((s) => {
                try {
                  s.stop(t + 0.16);
                } catch (_) {}
              });
              disconnectGainLater(master, 280);
            },
          };
        })
        .catch(synthHoldFallback);
    }

    const grid = document.getElementById("grid");
    const keySelect = document.getElementById("keySelect");
    const keyTitle = document.getElementById("keyTitle");

    function selectedKey() {
      return MAJOR_KEYS.find((k) => k.id === keySelect.value) || MAJOR_KEYS[0];
    }

    function safeStopHold(ctl) {
      if (ctl && typeof ctl.stop === "function") ctl.stop();
    }

    MAJOR_KEYS.forEach((k) => {
      const opt = document.createElement("option");
      opt.value = k.id;
      opt.textContent = `${k.id} 大调`;
      keySelect.appendChild(opt);
    });

    /** 七级色彩：左侧色条 + 罗马数字点缀（主体为深色面板） */
    const CHORD_ACCENTS = [
      { stripe: "#e05252", glow: "rgba(224, 82, 82, 0.55)" },
      { stripe: "#e1883d", glow: "rgba(225, 136, 61, 0.5)" },
      { stripe: "#c9a43a", glow: "rgba(201, 164, 58, 0.48)" },
      { stripe: "#4fb884", glow: "rgba(79, 184, 132, 0.48)" },
      { stripe: "#45a8c9", glow: "rgba(69, 168, 201, 0.5)" },
      { stripe: "#6b8ae8", glow: "rgba(107, 138, 232, 0.52)" },
      { stripe: "#9b72d4", glow: "rgba(155, 114, 212, 0.52)" },
    ];

    const TAP_DURATION_SEC = 2.65;
    /** 短按 / 长按分界：略短于常见「长按」体感，便于移动端快速进入 loop */
    const HOLD_ARM_MS = 210;

    function bindChordPointer(btn, midiNotes) {
      let holdTimer = null;
      let tapPending = false;
      let holdCtl = null;
      let holdPromise = null;
      let down = false;
      let capId = null;

      const clearHoldTimer = () => {
        if (holdTimer) {
          clearTimeout(holdTimer);
          holdTimer = null;
        }
      };

      const onDown = (e) => {
        if (e.button != null && e.button !== 0) return;
        if (down) return;
        down = true;
        tapPending = true;
        holdCtl = null;
        holdPromise = null;
        capId = e.pointerId;
        try {
          btn.setPointerCapture(e.pointerId);
        } catch (_) {}
        btn.classList.add("is-pressing");
        clearHoldTimer();
        const ctx = getCtx();
        void whenContextReady(ctx);
        preloadPianoForTonic(selectedKey().tonicMidi);
        chordSampleBases(midiNotes).forEach((b) => loadPianoBuffer(ctx, b));
        holdTimer = setTimeout(() => {
          holdTimer = null;
          tapPending = false;
          holdPromise = playChordHold(midiNotes, { gainScale: 1 }).then((ctl) => {
            holdPromise = null;
            holdCtl = ctl;
            if (!down) safeStopHold(ctl);
          });
        }, HOLD_ARM_MS);
      };

      const onUp = () => {
        if (!down) return;
        down = false;
        btn.classList.remove("is-pressing");
        clearHoldTimer();
        if (tapPending) {
          playChord(midiNotes, { durationSec: TAP_DURATION_SEC });
        } else {
          if (holdCtl) {
            safeStopHold(holdCtl);
            holdCtl = null;
          } else if (holdPromise) {
            holdPromise.then(safeStopHold);
          }
        }
        tapPending = false;
        holdCtl = null;
        holdPromise = null;
        if (capId != null) {
          try {
            btn.releasePointerCapture(capId);
          } catch (_) {}
          capId = null;
        }
      };

      btn.addEventListener("pointerdown", onDown);
      btn.addEventListener("pointerup", onUp);
      btn.addEventListener("pointercancel", onUp);
      btn.addEventListener("lostpointercapture", onUp);
      btn.addEventListener("selectstart", (e) => e.preventDefault());
    }

    function renderChords() {
      const key = selectedKey();
      keyTitle.textContent = key.id;
      keyTitle.classList.remove("is-bump");
      void keyTitle.offsetWidth;
      keyTitle.classList.add("is-bump");
      const triads = voicedTriadsForKey(key.tonicMidi);
      grid.replaceChildren();
      key.labels.forEach((label, i) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "chord-key";
        btn.style.setProperty("--i", String(i));
        const col = CHORD_ACCENTS[i] || CHORD_ACCENTS[CHORD_ACCENTS.length - 1];
        btn.style.setProperty("--stripe", col.stripe);
        btn.style.setProperty("--stripe-glow", col.glow);
        const rom = ROMAN[i].split(/\s*[—–-]\s*/);
        const romanLine =
          rom.length >= 2
            ? `<span class="roman-h">${rom[0]}</span> · ${rom[1]}`
            : ROMAN[i];
        btn.innerHTML = `
          <span class="chord-key__label">${label}</span>
          <div class="chord-key__roman">${romanLine}</div>
        `;
        bindChordPointer(btn, triads[i]);
        grid.appendChild(btn);
      });
      preloadPianoForTonic(key.tonicMidi).catch(() => {});
    }

    keySelect.addEventListener("change", renderChords);
    renderChords();

    function preloadIdle() {
      preloadPianoForTonic(selectedKey().tonicMidi);
    }
    if (typeof requestIdleCallback !== "undefined") requestIdleCallback(preloadIdle);
    else setTimeout(preloadIdle, 400);
  </script>
</body>
</html>
