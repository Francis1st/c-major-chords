<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>大调顺阶三和弦</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>
  <div class="bg-scene" aria-hidden="true"></div>
  <main class="shell">
    <div id="viewHome" class="view-home">
      <header class="hero">
        <h1>
          <span id="keyTitle" class="key-title">C</span><span class="title-rest"> 大调 · 顺阶三和弦</span>
        </h1>
        <div class="toolbar">
          <label for="keySelect">调式</label>
          <div class="select-wrap">
            <select id="keySelect" aria-label="选择大调调式"></select>
          </div>
          <label for="notationSelect">显示</label>
          <div class="select-wrap">
            <select id="notationSelect" aria-label="和弦显示：固定调或首调">
              <option value="fixed" selected>固定调</option>
              <option value="movable">首调</option>
            </select>
          </div>
        </div>
      </header>
      <section class="diatonic-stack">
        <div class="chord-strip" id="grid" role="group" aria-label="大调顺阶三和弦"></div>
        <div class="diatonic-stack__footer">
          <p class="diatonic-stack__hint">叠奏根音低八度，含自定义和弦。</p>
          <label class="root-boost">
            <input type="checkbox" id="rootBoost" class="root-boost__input" />
            <span class="root-boost__label">根音增强</span>
            <span class="root-boost__ui" aria-hidden="true">
              <span class="root-boost__track"></span>
              <span class="root-boost__thumb"></span>
            </span>
          </label>
        </div>
      </section>
      <div class="custom-row-wrap">
        <div class="custom-row-header">
          <span class="custom-row-label">自定义和弦</span>
          <button type="button" id="btnAddChord" class="btn-add-chord">添加和弦</button>
        </div>
        <div id="customGrid" class="chord-strip chord-strip--custom" role="group" aria-label="自定义和弦"></div>
      </div>
    </div>

    <section id="viewCustom" class="view-custom is-hidden" aria-hidden="true">
      <div class="view-custom__top">
        <h2>添加自定义和弦</h2>
        <button type="button" id="btnCustomBack" class="btn-back">返回</button>
      </div>
      <div class="piano-wrap">
        <div id="pianoRow" class="piano-keybed" role="group" aria-label="C3 至 B5 钢琴键盘"></div>
      </div>
      <div class="custom-form">
        <input type="text" id="customNameInput" maxlength="16" placeholder="和弦名称" autocomplete="off" />
        <button type="button" id="btnSaveCustom" class="btn-save-custom" disabled>保存</button>
      </div>
      <p id="customSaveErr" class="view-custom__err" hidden></p>
    </section>
  </main>

  <script type="module" src="js/app.js"></script>
</body>
</html>
